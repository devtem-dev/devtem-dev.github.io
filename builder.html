<meta name="twitter:image" content="https://design.devtem.org/assets/images/og.jpg"><!-- Structured Data --><script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "devtemDesign Builder",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Web",
  "url": "https://design.devtem.org/builder",
  "image": "https://design.devtem.org/assets/images/og.jpg",
  "description": "Visual page builder for generating landing pages, portfolios, SaaS websites, and exportable devtemDesign configurations.",

  }

  <link rel="stylesheet" href="/css/builder.css">
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="brand"><i class="fas fa-cube"></i> devtemDesign</div>
  <span class="sep">/</span>
  <span class="sub">Builder</span>
  <div class="header-right">
    <a class="proj-toggle-btn" href="projects" title="Your saved projects">
      <i class="fas fa-folder-open"></i> Projects
      <span class="proj-count" id="proj-count">0</span>
    </a>
    <div class="header-links">
      <a href="https://design.devtem.org/docs" target="_blank" rel="noreferrer" title="Docs"><i class="fas fa-book"></i></a>
      <a href="https://www.npmjs.com/package/devtemdesign" target="_blank" rel="noreferrer" title="npm"><i class="fab fa-npm"></i></a>
      <a href="https://github.com/devtem-dev/devtemDesign" target="_blank" rel="noreferrer" title="GitHub"><i class="fab fa-github"></i></a>
      <a href="https://devtem.org" target="_blank" rel="noreferrer" title="DevTemple"><i class="fas fa-store"></i></a>
    </div>
    <div class="theme-toggle">
      <button class="theme-btn active" id="btn-dark" title="Dark"><i class="fas fa-moon"></i></button>
      <button class="theme-btn" id="btn-light" title="Light"><i class="fas fa-sun"></i></button>
    </div>
  </div>
</header>

<!-- GENERATE BAR -->
<div class="gen-bar">
  <div>
    <div class="field-label"><i class="fas fa-pen-fancy"></i> Description</div>
    <textarea id="desc" rows="2" placeholder="e.g. I'm a freelance UI designer specializing in SaaS dashboards…"></textarea>
  </div>
  <div>
    <div class="field-label"><i class="fas fa-file-alt"></i> Page type</div>
    <div class="toggle-group">
      <button class="toggle-btn active" data-type="landing"><i class="fas fa-landmark"></i> Landing</button>
      <button class="toggle-btn" data-type="portfolio"><i class="fas fa-briefcase"></i> Portfolio</button>
    </div>
  </div>
  <div>
    <div class="field-label"><i class="fas fa-palette"></i> Template</div>
    <div class="template-grid">
      <button class="tpl-btn active" data-tpl="figsh"><span class="tpl-name">Figsh</span><span class="tpl-desc">Glass · cyan/purple</span></button>
      <button class="tpl-btn" data-tpl="cyber"><span class="tpl-name">Cyber</span><span class="tpl-desc">Neon · cyan/magenta</span></button>
      <button class="tpl-btn" data-tpl="aurora"><span class="tpl-name">Aurora</span><span class="tpl-desc">Organic · emerald/violet</span></button>
      <button class="tpl-btn" data-tpl="monochrome"><span class="tpl-name">Mono</span><span class="tpl-desc">Minimal grayscale</span></button>
    </div>
  </div>
  <div class="gen-btn-wrap">
    <button id="generate-btn" disabled>
      <i class="fas fa-rocket"></i> Generate page
    </button>
  </div>
</div>

<!-- ERROR -->
<div id="error-box" role="alert"><i class="fas fa-circle-exclamation"></i><span id="error-text"></span></div>

<!-- APP BODY -->
<div class="app-body">

  <!-- WORK AREA -->
  <div class="work-area">

    <!-- EDITOR SIDEBAR -->
    <div class="editor-sidebar">
      <div class="sidebar-toolbar">
        <span class="st-label">Editor</span>
        <!-- save btn shown once cfg exists -->
        <button class="btn-save" id="save-btn" style="display:none;" title="Save project">
          <i class="fas fa-floppy-disk"></i> Save project
        </button>
      </div>

      <div class="sidebar-placeholder" id="sidebar-placeholder">
        <i class="fas fa-wand-magic-sparkles"></i>
        <span>Generate a page to start editing</span>
      </div>

      <div class="editor-scroll" id="editor-scroll" style="display:none;">

        <!-- HERO -->
        <div class="ed-section open" id="sec-hero">
          <div class="ed-head"><div class="ed-title"><i class="fas fa-display"></i> Hero</div><i class="fas fa-chevron-down ed-chevron"></i></div>
          <div class="ed-body">
            <div class="f-row"><label>Logo name</label><input id="e-logoName" type="text"></div>
            <div class="f-row"><label>Logo URL</label><input id="e-logoUrl" type="text" placeholder="https://..."></div>
            <div class="f-row"><label>Tagline</label><input id="e-heroTag" type="text"></div>
            <div class="f-row"><label>Title line 1</label><input id="e-heroLine1" type="text"></div>
            <div class="f-row"><label>Title line 2</label><input id="e-heroLine2" type="text"></div>
            <div class="f-row"><label>Subtitle</label><textarea id="e-heroSubtitle" rows="2"></textarea></div>
            <div class="f-row"><label>Primary button</label><input id="e-primaryBtn" type="text"></div>
            <div class="f-row"><label>Secondary button</label><input id="e-secondaryBtn" type="text"></div>
            <div class="f-row"><label>Nav CTA</label><input id="e-ctaText" type="text"></div>
          </div>
        </div>

        <!-- BRANDS -->
        <div class="ed-section" id="sec-brands">
          <div class="ed-head"><div class="ed-title"><i class="fas fa-building"></i> Brands</div><i class="fas fa-chevron-down ed-chevron"></i></div>
          <div class="ed-body">
            <div class="f-row"><label>Ticker subtitle</label><input id="e-brandsSubtitle" type="text"></div>
            <div class="f-row">
              <label>Brand names</label>
              <div class="list-wrap" id="brandsList"></div>
              <button class="btn-add" id="addBrandBtn"><i class="fas fa-plus"></i> Add brand</button>
            </div>
          </div>
        </div>

        <!-- FEATURES -->
        <div class="ed-section" id="sec-features">
          <div class="ed-head"><div class="ed-title"><i class="fas fa-star"></i> Features / Cards</div><i class="fas fa-chevron-down ed-chevron"></i></div>
          <div class="ed-body">
            <div class="f-row"><label>Section label</label><input id="e-featuresLabel" type="text"></div>
            <div class="f-row"><label>Section title</label><input id="e-featuresTitle" type="text"></div>
            <div class="f-row">
              <label>Cards</label>
              <div class="list-wrap" id="featuresList"></div>
              <button class="btn-add" id="addFeatureBtn"><i class="fas fa-plus"></i> Add card</button>
            </div>
          </div>
        </div>

        <!-- PANELS -->
        <div class="ed-section" id="sec-panels">
          <div class="ed-head"><div class="ed-title"><i class="fas fa-layer-group"></i> Panels</div><i class="fas fa-chevron-down ed-chevron"></i></div>
          <div class="ed-body">
            <div class="list-wrap" id="panelsList"></div>
            <button class="btn-add" id="addPanelBtn"><i class="fas fa-plus"></i> Add panel</button>
          </div>
        </div>

        <!-- FOOTER -->
        <div class="ed-section" id="sec-footer">
          <div class="ed-head"><div class="ed-title"><i class="fas fa-print"></i> Footer</div><i class="fas fa-chevron-down ed-chevron"></i></div>
          <div class="ed-body">
            <div class="f-row"><label>Tagline</label><input id="e-footerTagline" type="text"></div>
            <div class="f-row"><label>Copyright</label><input id="e-footerCopy" type="text"></div>
            <div class="f-row">
              <label>Columns</label>
              <div class="list-wrap" id="footerColumnsList"></div>
              <button class="btn-add" id="addColumnBtn"><i class="fas fa-plus"></i> Add column</button>
            </div>
            <div class="f-row">
              <label>Social links</label>
              <div class="list-wrap" id="socialLinksList"></div>
              <button class="btn-add" id="addSocialBtn"><i class="fas fa-plus"></i> Add social</button>
            </div>
            <div class="f-row">
              <label>Legal links</label>
              <div class="list-wrap" id="legalLinksList"></div>
              <button class="btn-add" id="addLegalBtn"><i class="fas fa-plus"></i> Add legal</button>
            </div>
          </div>
        </div>

      </div><!-- /editor-scroll -->
    </div><!-- /editor-sidebar -->

    <!-- PREVIEW PANE -->
    <div class="preview-pane">
      <div class="preview-toolbar">
        <span class="pt-label"><i class="fas fa-eye"></i> Live preview</span>
        <div class="pt-actions">
          <button class="btn-ghost" id="copy-btn"><i class="fas fa-copy"></i> Copy HTML</button>
          <button class="btn-solid" id="export-btn"><i class="fas fa-download"></i> Export</button>
        </div>
      </div>
      <div class="preview-empty" id="preview-empty">
        <i class="fas fa-display"></i>
        <span>Your page will appear here</span>
        <span class="pe-hint">Fill in the description above and hit Generate page</span>
      </div>
      <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin" title="Live preview"></iframe>
    </div>

  </div><!-- /work-area -->
</div><!-- /app-body -->

<!-- PREVIEW MODAL -->
<div class="preview-modal" id="preview-modal">
  <div class="modal-bar">
    <span class="modal-title" id="modal-title">Preview</span>
    <button class="btn-ghost" id="modal-export-btn"><i class="fas fa-download"></i> Export</button>
    <button class="modal-close" id="modal-close"><i class="fas fa-times"></i> Close</button>
  </div>
  <iframe id="modal-frame" sandbox="allow-scripts allow-same-origin" title="Project preview"></iframe>
</div>

<!-- SAVE DIALOG -->
<div class="save-dialog" id="save-dialog">
  <div class="save-box">
    <h3><i class="fas fa-floppy-disk"></i> &nbsp;Save project</h3>
    <div>
      <label>Project name</label>
      <input id="save-name-input" type="text" placeholder="e.g. My Portfolio" style="margin-top:5px;">
    </div>
    <div class="save-box-actions">
      <button class="save-cancel" id="save-cancel">Cancel</button>
      <button class="save-confirm" id="save-confirm">Save</button>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="app-footer">
  <a href="https://design.devtem.org/docs" target="_blank" rel="noreferrer"><i class="fas fa-book"></i> docs</a>
  <span class="fsep">·</span>
  <a href="https://www.npmjs.com/package/devtemdesign" target="_blank" rel="noreferrer"><i class="fab fa-npm"></i> npm</a>
  <span class="fsep">·</span>
  <a href="https://github.com/devtem-dev/devtemDesign" target="_blank" rel="noreferrer"><i class="fab fa-github"></i> GitHub</a>
  <span class="fsep">·</span>
  <a href="https://devtem.org" target="_blank" rel="noreferrer"><i class="fas fa-store"></i> DevTemple</a>
</footer>

<script src="/js/builder.js"></script>
</body>
</html>
