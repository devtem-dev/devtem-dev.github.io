    /* ── FONT OVERRIDES ──────────────────────────────────────── */
    body    { font-family: 'JetBrains Mono', monospace; }
    h1, h2, h3, .nav-logo, .hero-title { font-family: 'Syne', sans-serif !important; }

    /* ── API PAGE SHELL ──────────────────────────────────────── */
    .api-page {

    /* ── PAGE HEADER ─────────────────────────────────────────── */
    .api-header {

    .api-header-inner {

    }
    .api-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }
    .api-eyebrow::before {
      content: '';
      width: 28px; height: 1px;
      background: var(--accent);
    }
    .api-header h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
    }
    .api-header h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .api-header-desc {
      font-size: 0.88rem;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.75;
      margin-bottom: 36px;
    }
    .api-version-strip {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .api-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
    }
    .api-badge i { color: var(--accent); }
    .api-badge.accent { border-color: var(--accent); color: var(--accent); }

    /* ── LAYOUT: sidebar + content ───────────────────────────── */
    .api-body {
      display: grid;
      grid-template-columns: 220px 1fr;
      max-width: 1100px;
      margin: 0 auto;
      min-height: 60vh;
    }

    /* ── SIDEBAR NAV ─────────────────────────────────────────── */
    .api-sidebar {
      padding: 40px 0 40px 48px;
      position: sticky;
      top: 80px;
      align-self: start;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      scrollbar-width: none;
    }
    .api-sidebar::-webkit-scrollbar { display: none; }

    .sidebar-group { margin-bottom: 32px; }
    .sidebar-group-label {
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      margin-bottom: 10px;
      padding-left: 2px;
    }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s, background 0.2s;
      margin-bottom: 2px;
    }

    .sidebar-link.active { color: var(--accent); background: rgba(122,244,255,0.06); }
    .sidebar-link i { width: 14px; text-align: center; font-size: 0.7rem; opacity: 0.7; }

    /* ── MAIN CONTENT ────────────────────────────────────────── */
    .api-content {
      padding: 48px 48px 80px 40px;
      min-width: 0;
    }

    .api-section {
      margin-bottom: 72px;
      scroll-margin-top: 96px;
    }
    .section-heading {
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--glass-border);
    }
    .section-heading .s-icon {
      width: 32px; height: 32px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 0.8rem; flex-shrink: 0;
    }
    .section-intro {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 28px;
      max-width: 640px;
    }

    /* ── SIGNATURE BOX ───────────────────────────────────────── */
    .sig-box {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 22px 28px;
      font-size: 0.82rem;
      line-height: 1.8;
      margin-bottom: 32px;
      overflow-x: auto;
    }
    .sig-fn   { color: var(--accent2); }
    .sig-param{ color: var(--accent);  }
    .sig-type { color: var(--accent3); font-style: italic; }
    .sig-opt  { color: rgba(255,255,255,0.3); }

    /* ── PROP TABLE ──────────────────────────────────────────── */
    .prop-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
      margin-bottom: 16px;
    }
    .prop-table thead th {
      text-align: left;
      padding: 8px 14px;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      border-bottom: 1px solid var(--glass-border);
    }
    .prop-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .prop-table tbody tr:hover { background: rgba(255,255,255,0.025); }
    .prop-table td { padding: 12px 14px; vertical-align: top; line-height: 1.55; }
    .prop-table td:first-child {
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
    }
    .td-type {
      color: var(--accent3) !important;
      font-style: italic;
    }
    .td-default { color: rgba(255,255,255,0.35) !important; }
    .td-desc    { color: var(--muted) !important; }

    /* ── CODE BLOCKS ─────────────────────────────────────────── */
    .code-block {
      position: relative;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 24px 28px;
      font-size: 0.78rem;
      line-height: 1.85;
      overflow-x: auto;
      margin-bottom: 28px;
    }
    .code-block pre { margin: 0; white-space: pre; }
    .code-label {
      position: absolute;
      top: -1px; right: -1px;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #000;
      background: var(--accent);
      padding: 3px 12px;
      border-radius: 0 14px 0 8px;
      font-weight: 700;
    }
    .copy-btn {
      position: absolute;
      bottom: 12px; right: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.62rem;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.08em;
      transition: 0.2s;
    }
    .copy-btn:hover { color: white; border-color: var(--accent); }

    /* Syntax colors inside code blocks */
    .kw  { color: var(--accent2); }   /* keyword / key  */
    .str { color: #a8ff78; }          /* string value   */
    .num { color: var(--accent3); }   /* number         */
    .cmt { color: rgba(255,255,255,0.28); font-style: italic; }
    .fn  { color: var(--accent);  }   /* function name  */
    .obj { color: rgba(255,255,255,0.6); }

    /* ── CALLOUTS ────────────────────────────────────────────── */
    .callout {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 0.78rem;
      line-height: 1.65;
      margin-bottom: 20px;
    }
    .callout.info {
      background: rgba(122,244,255,0.06);
      border: 1px solid rgba(122,244,255,0.2);
      word-break: break-all;
    }
    .callout.warn {
      background: rgba(255,170,0,0.06);
      border: 1px solid rgba(255,170,0,0.2);
    }
    .callout i { margin-top: 1px; flex-shrink: 0; }
    .callout.info i { color: var(--accent); }
    .callout.warn i { color: #ffaa00; }

    /* ── OBJECT SCHEMA CARDS ─────────────────────────────────── */
    .schema-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .schema-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 20px 22px;
    }
    .schema-card-title {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 12px;
    }
    .schema-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.72rem;
    }
    .schema-row:last-child { border-bottom: none; }
    .schema-key   { color: var(--accent); }
    .schema-vtype { color: var(--accent3); font-style: italic; }

    /* ── TEMPLATE PALETTE ────────────────────────────────────── */
    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .template-swatch {
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 18px 20px;
      cursor: default;
      transition: border-color 0.2s, transform 0.2s;
    }
    .template-swatch:hover { border-color: var(--glass-border); transform: translateY(-2px); }
    .swatch-dots {
      display: flex; gap: 6px; margin-bottom: 14px;
    }
    .swatch-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .swatch-name {
      font-size: 0.7rem; letter-spacing: 0.12em;
      text-transform: uppercase; font-weight: 700;
      margin-bottom: 4px;
    }
    .swatch-vibe {
      font-size: 0.68rem; color: var(--muted); line-height: 1.5;
    }

    /* ── MOBILE ──────────────────────────────────────────────── */
    @media (max-width: 860px) {
      .api-body { grid-template-columns: 1fr; }
      .api-sidebar { display: none; }
      .api-header, .api-content { padding-left: 20px; padding-right: 20px; }
    }
    @media (max-width: 680px) {
      .api-header { padding: 48px 20px 36px; }
      .prop-table { display: block; overflow-x: auto; }
    }
  </style>
</head>

{

  // Sidebar active highlight on scroll
  const sections = document.querySelectorAll('.api-section');
  const sidebarLinks = document.querySelectorAll('.sidebar-link');
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        sidebarLinks.forEach(l => l.classList.remove('active'));
        const active = document.querySelector(`.sidebar-link[href="#${entry.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  sections.forEach(s => obs.observe(s));

}, 80);

// ── COPY CODE HELPER ─────────────────────────────────────────────
function copyCode(btn) {
  const block = btn.closest('.code-block');
  const pre   = block.querySelector('pre');
  // Strip HTML tags to get plain text
  const text  = pre.innerText || pre.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'copied!';
    setTimeout(() => { btn.textContent = orig; }, 1600);
  });
}
</script>
