<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>404 · devtemDesign</title>
  <meta name="description" content="Page not found — but the engine still runs.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/style.css">
  <script src="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/script.js"></script>

  <style>
    /* ── TEMPLATE SWITCHER ─────────────────────────────────────── */
    .template-switcher {
      position: fixed;
      bottom: 24px; right: 24px;
      z-index: 9997;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 8px 16px;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-family: monospace;
    }
    .switcher-label {
      color: rgba(255,255,255,0.3);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      margin-right: 4px;
    }
    .template-btn {
      background: transparent;
      border: none;
      color: var(--muted, #aaa);
      padding: 5px 12px;
      border-radius: 40px;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      transition: all 0.2s ease;
    }
    .template-btn:hover { background: rgba(255,255,255,0.08); color: white; }
    .template-btn.active {
      background: var(--accent, #0ff);
      color: #000;
      font-weight: 700;
    }

    /* ── 404 HERO OVERRIDE ─────────────────────────────────────── */

    /* Collapse the engine's default hero content to near-zero */
    .hero-tag,
    .hero-title,
    .hero-sub,
    .hero-buttons,
    .hero-inline-brands,
    .features,
    .panels-section,
    .marquee-section { display: none !important; }

    .hero {
      min-height: 100vh;
      padding: 100px 24px 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── 404 CONTENT BLOCK ─────────────────────────────────────── */
    .e404 {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
      animation: e404FadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }

    @keyframes e404FadeUp {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* Giant glitch "404" */
    .e404-code {
      font-size: clamp(7rem, 22vw, 16rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--accent) 10%, var(--accent2) 55%, var(--accent3) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      user-select: none;
    }

    /* Glitch layers */
    .e404-code::before,
    .e404-code::after {
      content: "404";
      position: absolute;
      inset: 0;
      background: inherit;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      animation: glitchLoop 6s infinite;
    }
    .e404-code::before {
      left: 3px;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      -webkit-background-clip: text;
      background-clip: text;
      animation-delay: 0s;
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    }
    .e404-code::after {
      left: -3px;
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      animation-delay: 0.08s;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    }

    @keyframes glitchLoop {
      0%, 88%, 100% { opacity: 0; transform: none; }
      90%           { opacity: 0.7; transform: translateX(-4px) skewX(-2deg); }
      93%           { opacity: 0.5; transform: translateX(4px)  skewX(2deg);  }
      96%           { opacity: 0.6; transform: translateX(-2px);              }
    }

    /* Scanline overlay on the 404 number */
    .e404-code-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 8px;
    }
    .e404-code-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
    }

    /* Status badge */
    .e404-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: monospace;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.02);
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 28px;
    }
    .e404-badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulseDot 1.8s ease-in-out infinite;
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1;   transform: scale(1);   }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }

    /* Heading + description */
    .e404-heading {
      font-size: clamp(1.6rem, 4.5vw, 2.6rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    .e404-sub {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* Action buttons */
    .e404-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .e404-btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 34px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--accent);
      backdrop-filter: blur(12px);
      color: var(--text);
      border-radius: 60px;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .e404-btn-primary:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    }
    .e404-btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--muted);
      border-radius: 60px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s, border-color 0.2s;
    }
    .e404-btn-ghost:hover { color: white; border-color: rgba(255,255,255,0.35); }

    /* Path hint */
    .e404-path {
      margin-top: 36px;
      font-family: monospace;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.08em;
    }
    .e404-path span { color: var(--accent3); }

    /* ── RESPONSIVE ────────────────────────────────────────────── */
    @media (max-width: 680px) {
      .template-switcher { bottom: 14px; right: 14px; padding: 6px 12px; gap: 4px; }
      .template-btn { padding: 4px 10px; font-size: 0.62rem; }
      .switcher-label { display: none; }
      .e404-actions { flex-direction: column; align-items: stretch; }
      .e404-btn-primary, .e404-btn-ghost { justify-content: center; }
    }
  </style>
</head>
<body>

<div id="app-root"></div>

<!-- Template switcher pill -->
<div class="template-switcher">
  <span class="switcher-label"><i class="fas fa-palette"></i></span>
  <button class="template-btn" data-template="figsh">FIGSH</button>
  <button class="template-btn" data-template="cyber">CYBER</button>
  <button class="template-btn" data-template="aurora">AURORA</button>
  <button class="template-btn" data-template="monochrome">MONO</button>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────
const BASE_CONFIG = {
  logoName: "DEVTEM",
  logo: "https://fscss.devtem.org/assets/images/fscss.png",
  navLinks: [
    { label: "Docs",        href: "/docs"        },
    { label: "Sandbox",     href: "/sandbox"     },
    { label: "Schema API",  href: "/api"         },
    { label: "npm Package", href: "https://www.npmjs.com/package/devtemdesign" }
  ],
  ctaText: "CDN →",
  // Hero content hidden via CSS; these just prevent engine defaults showing through
  heroTag:         "404",
  heroTitleLine1:  "",
  heroTitleLine2:  "",
  heroSubtitle:    "",
  primaryBtnText:  "",
  secondaryBtnText:"",
  brands:  [],
  features:[],
  panels:  [],
  footer: {
    tagline: "Declarative UI engine for the modern web. Zero config. Full motion.",
    columns: [
      {
        heading: "Product",
        links: [
          { label: "Documentation", href: "/docs"    },
          { label: "Sandbox",       href: "/sandbox" },
          { label: "Schema API",    href: "/api"     },
          { label: "Changelog",     href: "https://github.com/devtem-dev/devtemDesign" }
        ]
      },
      {
        heading: "Resources",
        links: [
          { label: "npm Package",   href: "https://www.npmjs.com/package/devtemdesign" },
          { label: "GitHub",        href: "https://github.com/devtem-dev" },
          { label: "DevTemple",     href: "https://devtem.org"       },
          { label: "FSCSS Engine",  href: "https://fscss.devtem.org" }
        ]
      },
      {
        heading: "Company",
        links: [
          { label: "About DevTemple",   href: "https://devtem.org"   },
          { label: "Templates",          href: "https://devtem.org/home"    },
          { label: "Contact",       href: "https://devtem.org/contact" }
        ]
      }
    ],
    social: [
      { icon: "fab fa-github",   href: "https://github.com/devtem-dev/devtemDesign",       label: "GitHub"   },
      { icon: "fab fa-twitter",  href: "https://twitter.com/fscss_ttr",  label: "Twitter"  },
      { icon: "fab fa-npm",      href: "https://npmjs.com/package/devtemdesign", label: "npm" },
      { icon: "fab fa-dev",      href: "https://dev.to/fscss",       label: "DEV"      }
    ],
    legal: [
      { label: "Privacy Policy", href: "/privacy" },
      { label: "Terms of Use",   href: "/terms"   },
      { label: "License (MIT)",  href: "/license" }
    ],
    copy: `© ${new Date().getFullYear()} Figsh Digital · devtemDesign is open source`
  }
};

const CDN_SNIPPET =
  `<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/style.css">\n` +
  `<script src="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/script.js"><\/script>`;

// ── RENDER ───────────────────────────────────────────────────────
function render(template) {
  devtemDesign("app-root", { ...BASE_CONFIG, template });
  // Short delay lets the engine paint, then we inject our 404 block
  setTimeout(() => {
    inject404Block();
    bindCTAHandlers();
    setActiveBtn(template);
  }, 80);
}

// ── 404 BLOCK ────────────────────────────────────────────────────
function inject404Block() {
  if (document.querySelector('.e404')) return; // already injected

  const hero = document.querySelector('.hero');
  if (!hero) return;

  // Detect current path for the hint line
  const path = window.location.pathname || '/unknown';

  const block = document.createElement('div');
  block.className = 'e404';
  block.innerHTML = `
    <div class="e404-badge">
      <span class="e404-badge-dot"></span>
      ENGINE RUNNING · STATUS 404
    </div>
    <div class="e404-code-wrap">
      <div class="e404-code">404</div>
    </div>
    <div class="e404-heading">Lost in the void?</div>
    <p class="e404-sub">
      The path you requested doesn't exist — but the engine is still running.
      Navigate back to solid ground.
    </p>
    <div class="e404-actions">
      <a href="/" class="e404-btn-primary">
        <i class="fas fa-arrow-left"></i> Return Home
      </a>
      <button class="e404-btn-ghost" id="copyCdnBtn">
        <i class="fas fa-copy"></i> Copy CDN
      </button>
    </div>
    <div class="e404-path">requested path: <span>${path}</span></div>
  `;

  hero.appendChild(block);

  // Copy CDN button
  document.getElementById('copyCdnBtn').addEventListener('click', function() {
    navigator.clipboard.writeText(CDN_SNIPPET).then(() => {
      const orig = this.innerHTML;
      this.innerHTML = '<i class="fas fa-check"></i> Copied!';
      setTimeout(() => { this.innerHTML = orig; }, 1600);
    });
  });
}

// ── NAV CTA HANDLER (copy CDN) ───────────────────────────────────
function bindCTAHandlers() {
  const navCta = document.querySelector('.nav-cta');
  if (navCta && !navCta._bound404) {
    navCta._bound404 = true;
    navCta.addEventListener('click', () => {
      navigator.clipboard.writeText(CDN_SNIPPET).then(() => {
        const orig = navCta.innerHTML;
        navCta.innerHTML = '✓ Copied!';
        setTimeout(() => { navCta.innerHTML = orig; }, 1500);
      });
    });
  }
}

// ── TEMPLATE SWITCHER ────────────────────────────────────────────
function setActiveBtn(template) {
  document.querySelectorAll('.template-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.template === template);
  });
}

document.querySelectorAll('.template-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    // Remove old 404 block so inject404Block re-runs cleanly
    const old = document.querySelector('.e404');
    if (old) old.remove();
    render(btn.dataset.template);
  });
});

// ── INIT ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (typeof devtemDesign === 'function') {
    render('cyber');
  } else {
    // Fallback if CDN fails
    document.getElementById('app-root').innerHTML = `
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;font-family:monospace;">
        <div style="font-size:7rem;font-weight:900;opacity:0.15;">404</div>
        <h1 style="font-size:2rem;margin-bottom:12px;">Page not found</h1>
        <a href="/" style="color:#7af4ff;font-size:0.9rem;">← Return home</a>
      </div>
    `;
  }
});
</script>
</body>
</html>
