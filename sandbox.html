<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sandbox · devtemDesign</title>
  <meta name="description" content="Interactive config playground for devtemDesign — edit the schema, see the page render live.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/script.js"></script>

  <style>
    /* ── SUPPRESS ENGINE HERO ────────────────────────────────── */
    .hero-tag, .hero-title, .hero-sub,
    .hero-buttons, .hero-inline-brands,
    .features, .panels-section, .marquee-section { display: none !important; }
    .hero { min-height: unset; padding: 0; }
    footer { display: none !important; }

    /* ── FONT OVERRIDE ───────────────────────────────────────── */
    body, textarea, input, select, button {
      font-family: 'JetBrains Mono', monospace;
    }
    h1, h2, h3 { font-family: 'Syne', sans-serif; }

    /* ── SANDBOX SHELL ───────────────────────────────────────── */
    .sandbox {
      position: relative;
      z-index: 2;
      padding-top: 64px; /* nav */
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ─────────────────────────────────────────────── */
    .sb-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 48px;
      border-bottom: 1px solid var(--glass-border);
      background: rgba(4,6,16,0.7);
      backdrop-filter: blur(16px);
      flex-shrink: 0;
      gap: 12px;
      flex-wrap: wrap;
    }
    .sb-topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sb-title {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }
    .sb-version {
      font-size: 0.6rem;
      color: var(--muted);
      border: 1px solid var(--glass-border);
      padding: 2px 8px;
      border-radius: 100px;
    }
    .sb-topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Template pill buttons */
    .tpl-pills {
      display: flex;
      gap: 4px;
    }
    .tpl-pill {
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--muted);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }
    .tpl-pill:hover  { color: white; border-color: rgba(255,255,255,0.3); }
    .tpl-pill.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

    /* Action buttons */
    .sb-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 14px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }
    .sb-btn:hover  { color: white; border-color: rgba(255,255,255,0.3); }
    .sb-btn.run    { border-color: var(--accent); color: var(--accent); }
    .sb-btn.run:hover { background: var(--accent); color: #000; }
    .sb-btn.active-view { background: rgba(255,255,255,0.07); color: white; }

    /* ── MAIN SPLIT ──────────────────────────────────────────── */
    .sb-split {
      display: grid;
      grid-template-columns: 420px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── EDITOR PANE ─────────────────────────────────────────── */
    .sb-editor {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--glass-border);
      background: rgba(4,6,14,0.85);
      overflow: hidden;
    }
    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 36px;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .pane-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }
    .pane-label i { color: var(--accent2); font-size: 0.6rem; }
    .pane-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100%{ opacity:1; } 50%{ opacity:0.3; }
    }

    /* Textarea editor */
    .sb-textarea {
      flex: 1;
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: #c9d1d9;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.76rem;
      line-height: 1.85;
      padding: 20px 20px 20px 56px;
      caret-color: var(--accent);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
      tab-size: 2;
    }
    .sb-textarea::selection { background: rgba(122,244,255,0.15); }

    /* Line number gutter */
    .editor-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .gutter {
      position: absolute;
      top: 0; left: 0;
      width: 40px;
      height: 100%;
      background: rgba(0,0,0,0.2);
      border-right: 1px solid rgba(255,255,255,0.04);
      padding-top: 20px;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }
    .gutter-line {
      display: block;
      text-align: right;
      padding-right: 8px;
      font-size: 0.68rem;
      line-height: 1.85;
      color: rgba(255,255,255,0.12);
      font-family: 'JetBrains Mono', monospace;
      height: calc(0.76rem * 1.85);
    }

    /* Error bar */
    .sb-error {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: rgba(255,50,80,0.1);
      border-top: 1px solid rgba(255,50,80,0.3);
      color: #ff6080;
      font-size: 0.68rem;
      flex-shrink: 0;
    }
    .sb-error.visible { display: flex; }

    /* ── PREVIEW PANE ────────────────────────────────────────── */
    .sb-preview {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #020407;
    }
    .preview-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      height: 36px;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }
    .preview-dot { width: 10px; height: 10px; border-radius: 50%; }

    .preview-frame-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #020407;
    }

    /* Loading overlay */
    .preview-loading {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2,4,7,0.8);
      backdrop-filter: blur(4px);
      z-index: 10;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      gap: 10px;
    }
    .preview-loading.visible { display: flex; }
    .spin {
      width: 14px; height: 14px;
      border: 2px solid rgba(122,244,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STATUS BAR ──────────────────────────────────────────── */
    .sb-statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 28px;
      border-top: 1px solid var(--glass-border);
      background: rgba(4,6,16,0.9);
      flex-shrink: 0;
      gap: 20px;
    }
    .sb-status-left, .sb-status-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .sb-stat {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .sb-stat i { font-size: 0.55rem; }
    .sb-stat.ok  i,
    .sb-stat.ok    { color: #22c55e; }
    .sb-stat.err   { color: #ff6080; }
    .sb-stat.warn  { color: #ffaa00; }

    /* ── MOBILE ──────────────────────────────────────────────── */
    @media (max-width: 860px) {
      .sb-split {
        grid-template-columns: 1fr;
        grid-template-rows: 50% 50%;
      }
      .sb-editor { border-right: none; border-bottom: 1px solid var(--glass-border); }
      .tpl-pills { display: none; }
    }
    @media (max-width: 520px) {
      .sb-topbar { height: auto; padding: 8px 12px; }
      .sb-title  { display: none; }
    }
  </style>
</head>
<body>
<div id="app-root"></div>

<script>
// ── ENGINE SHELL ─────────────────────────────────────────────────
devtemDesign("app-root", {
  template: "figsh",
  logoName: "DEVTEM",
  logo: "https://fscss.devtem.org/assets/images/fscss.png",
  navLinks: [
    { label: "Docs",       href: "/docs"    },
    { label: "Sandbox",    href: "/sandbox" },
    { label: "Schema API", href: "/api"     },
    { label: "npm",        href: "https://www.npmjs.com/package/devtemdesign" }
  ],
  ctaText: "CDN →",
  heroTag: "", heroTitleLine1: "", heroTitleLine2: "",
  heroSubtitle: "", primaryBtnText: "", secondaryBtnText: "",
  brands: [], features: [], panels: []
});

// ── DEFAULT CONFIG ───────────────────────────────────────────────
const DEFAULT_CONFIG = `devtemDesign("app-root", {
  template: "cyber",
  logoName: "SANDBOX",
  logo: "https://fscss.devtem.org/assets/images/fscss.png",

  navLinks: [
    { label: "Docs",    href: "/docs"    },
    { label: "API",     href: "/api"     },
    { label: "GitHub",  href: "#"        }
  ],
  ctaText: "Get Started →",

  heroTag:          "✦ Live Preview",
  heroTitleLine1:   "Edit the config.",
  heroTitleLine2:   "See it render.",
  heroSubtitle:     "Modify the schema on the left. Hit Run or press Ctrl+Enter to update the preview.",
  primaryBtnText:   "<i class='fas fa-bolt'></i> Explore",
  secondaryBtnText: "Docs →",

  brands: ["DEVTEMPLE", "FSCSS", "FIGSH", "ESBUILD"],
  brandsSubtitle: "built with open source",

  featuresSectionLabel: "core mechanics",
  featuresSectionTitle: "Pass data. The engine paints itself.",
  features: [
    {
      title: "Declarative Schema",
      desc:  "Map a config object to hardware-accelerated layouts.",
      icon:  "<i class='fas fa-cube'></i>"
    },
    {
      title: "4 Live Themes",
      desc:  "Switch figsh, cyber, aurora, monochrome with one token.",
      icon:  "<i class='fas fa-palette'></i>"
    },
    {
      title: "Zero Bundles",
      desc:  "Pure CSS + JS. No framework. No build step.",
      icon:  "<i class='fas fa-feather'></i>"
    }
  ],

  panels: [
    { tag: "API",  title: "devtemDesign({…})", desc: "One function call. Complete animated layout." },
    { tag: "PERF", title: "Passive Inertia",   desc: "IntersectionObserver + CSS custom properties." }
  ],

  footer: {
    tagline: "Declarative UI engine for the modern web.",
    columns: [
      {
        heading: "Product",
        links: [
          { label: "Documentation", href: "/docs"    },
          { label: "Sandbox",       href: "/sandbox" },
          { label: "Schema API",    href: "/api"     }
        ]
      }
    ],
    social: [
      { icon: "fab fa-github",  href: "#", label: "GitHub"  },
      { icon: "fab fa-twitter", href: "#", label: "Twitter" }
    ],
    legal: [
      { label: "MIT License", href: "/license" }
    ],
    copy: "© 2026 Figsh Digital · devtemDesign"
  }
});`;

// ── IFRAME TEMPLATE ──────────────────────────────────────────────
function buildIframeSrc(code) {
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/style.css">
<script src="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/script.js"><\/script>
<style>body{cursor:auto;}</style>
</head>
<body>
<div id="app-root"></div>
<script>
window.addEventListener('DOMContentLoaded', function() {
  try {
    ${code}
    window.parent.postMessage({ type: 'render-ok' }, '*');
  } catch(e) {
    window.parent.postMessage({ type: 'render-err', msg: e.message }, '*');
  }
});
<\/script>
</body>
</html>`;
}

// ── SANDBOX INJECTION ────────────────────────────────────────────
setTimeout(() => {
  const hero = document.querySelector('.hero');
  if (!hero) return;

  hero.insertAdjacentHTML('afterend', `
  <div class="sandbox">

    <!-- TOP BAR -->
    <div class="sb-topbar">
      <div class="sb-topbar-left">
        <span class="sb-title"><i class="fas fa-flask"></i> Sandbox</span>
        <span class="sb-version">v0.0.2</span>
        <div class="tpl-pills">
          <button class="tpl-pill" data-tpl="figsh">FIGSH</button>
          <button class="tpl-pill active" data-tpl="cyber">CYBER</button>
          <button class="tpl-pill" data-tpl="aurora">AURORA</button>
          <button class="tpl-pill" data-tpl="monochrome">MONO</button>
        </div>
      </div>
      <div class="sb-topbar-right">
        <button class="sb-btn" id="resetBtn"><i class="fas fa-rotate-left"></i> Reset</button>
        <button class="sb-btn" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
        <button class="sb-btn run" id="runBtn"><i class="fas fa-play"></i> Run <kbd style="opacity:0.5;font-size:0.55rem;">Ctrl+↵</kbd></button>
      </div>
    </div>

    <!-- SPLIT -->
    <div class="sb-split">

      <!-- EDITOR -->
      <div class="sb-editor">
        <div class="pane-header">
          <span class="pane-label"><i class="fas fa-code"></i> config.js</span>
          <span class="pane-dot"></span>
        </div>
        <div class="editor-wrap">
          <div class="gutter" id="gutter"></div>
          <textarea class="sb-textarea" id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
        </div>
        <div class="sb-error" id="errorBar">
          <i class="fas fa-triangle-exclamation"></i>
          <span id="errorMsg">Syntax error</span>
        </div>
      </div>

      <!-- PREVIEW -->
      <div class="sb-preview">
        <div class="preview-toolbar">
          <span class="preview-dot" style="background:#ff5f57;"></span>
          <span class="preview-dot" style="background:#febc2e;"></span>
          <span class="preview-dot" style="background:#28c840;"></span>
          <span style="flex:1;"></span>
          <span style="font-size:0.6rem;color:rgba(255,255,255,0.2);letter-spacing:0.1em;">LIVE PREVIEW</span>
        </div>
        <div class="preview-frame-wrap">
          <div class="preview-loading" id="previewLoading">
            <span class="spin"></span> RENDERING
          </div>
          <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
      </div>

    </div>

    <!-- STATUS BAR -->
    <div class="sb-statusbar">
      <div class="sb-status-left">
        <span class="sb-stat" id="statStatus"><i class="fas fa-circle"></i> <span id="statText">Ready</span></span>
        <span class="sb-stat" id="statLines"><i class="fas fa-lines-leaning"></i> <span id="lineCount">-</span> lines</span>
      </div>
      <div class="sb-status-right">
        <span class="sb-stat"><i class="fas fa-cube"></i> devtemdesign@0.0.2</span>
        <span class="sb-stat"><i class="fab fa-js"></i> Vanilla JS</span>
      </div>
    </div>

  </div>
  `);

  const editor      = document.getElementById('editor');
  const iframe      = document.getElementById('preview-iframe');
  const errorBar    = document.getElementById('errorBar');
  const errorMsg    = document.getElementById('errorMsg');
  const loading     = document.getElementById('previewLoading');
  const statStatus  = document.getElementById('statStatus');
  const statText    = document.getElementById('statText');
  const lineCount   = document.getElementById('lineCount');
  const gutter      = document.getElementById('gutter');

  // Hoisted — must be declared before runPreview() is called below
  let renderTimer = null;

  // Set default code
  editor.value = DEFAULT_CONFIG;
  updateGutter();
  updateLineCount();

  // Run on load
  runPreview();

  // ── GUTTER ─────────────────────────────────────────────────
  function updateGutter() {
    const lines = editor.value.split('\n').length;
    let html = '';
    for (let i = 1; i <= lines; i++) {
      html += `<span class="gutter-line">${i}</span>`;
    }
    gutter.innerHTML = html;
    // Sync scroll
    gutter.scrollTop = editor.scrollTop;
  }

  editor.addEventListener('input', () => { updateGutter(); updateLineCount(); });
  editor.addEventListener('scroll', () => { gutter.scrollTop = editor.scrollTop; });

  // Tab key support
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end   = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      updateGutter();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runPreview();
    }
  });

  function updateLineCount() {
    lineCount.textContent = editor.value.split('\n').length;
  }

  // ── RUN PREVIEW ────────────────────────────────────────────
  function runPreview() {
    clearTimeout(renderTimer);
    loading.classList.add('visible');
    setStatus('running', 'Rendering…');
    errorBar.classList.remove('visible');

    renderTimer = setTimeout(() => {
      const code = editor.value.trim();
      const html = buildIframeSrc(code);
      const blob = new Blob([html], { type: 'text/html' });
      const url  = URL.createObjectURL(blob);
      iframe.src = url;
    }, 100);
  }

  // ── LISTEN TO IFRAME MESSAGES ───────────────────────────────
  window.addEventListener('message', (e) => {
    loading.classList.remove('visible');
    if (e.data.type === 'render-ok') {
      setStatus('ok', 'Rendered');
      errorBar.classList.remove('visible');
    } else if (e.data.type === 'render-err') {
      setStatus('err', 'Error');
      errorMsg.textContent = e.data.msg;
      errorBar.classList.add('visible');
    }
  });

  // Fallback hide loading after 4s
  iframe.addEventListener('load', () => {
    setTimeout(() => loading.classList.remove('visible'), 400);
  });

  // ── STATUS HELPERS ──────────────────────────────────────────
  function setStatus(type, text) {
    statStatus.className = 'sb-stat ' + type;
    statText.textContent = text;
    const icon = statStatus.querySelector('i');
    if (icon) {
      icon.className = type === 'ok'  ? 'fas fa-circle-check' :
                       type === 'err' ? 'fas fa-circle-xmark' :
                                        'fas fa-circle-notch fa-spin';
    }
  }

  // ── TEMPLATE PILLS ──────────────────────────────────────────
  document.querySelectorAll('.tpl-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.tpl-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');

      const tpl = pill.dataset.tpl;
      // Swap template token in editor
      editor.value = editor.value.replace(
        /template:\s*["'][a-z]+["']/,
        `template: "${tpl}"`
      );
      updateGutter();
      runPreview();
    });
  });

  // ── RUN / RESET / COPY BUTTONS ──────────────────────────────
  document.getElementById('runBtn').addEventListener('click', runPreview);

  document.getElementById('resetBtn').addEventListener('click', () => {
    editor.value = DEFAULT_CONFIG;
    updateGutter();
    updateLineCount();
    // Reset template pills to cyber
    document.querySelectorAll('.tpl-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.tpl === 'cyber');
    });
    runPreview();
  });

  document.getElementById('copyBtn').addEventListener('click', function() {
    navigator.clipboard.writeText(editor.value).then(() => {
      const orig = this.innerHTML;
      this.innerHTML = '<i class="fas fa-check"></i> Copied!';
      setTimeout(() => { this.innerHTML = orig; }, 1500);
    });
  });

}, 80);
</script>
</body>
</html>
