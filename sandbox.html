<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>devtemDesign · Interactive Sandbox</title>
  <meta name="description" content="Live playground for devtemDesign — experiment with config and see instant results.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/style.css">
  <script src="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/script.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0a0c15;
      overflow-x: hidden;
    }

    /* Sandbox layout */
    .sandbox-container {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Editor panel */
    .editor-panel {
      width: 45%;
      background: #0f111a;
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }

    .editor-header {
      padding: 1rem 1.25rem;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-family: monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--accent, #0ff);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .editor-header h3 {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .editor-actions {
      display: flex;
      gap: 10px;
    }

    .editor-actions button {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: #ccc;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: monospace;
    }

    .editor-actions button:hover {
      background: var(--accent, #0ff);
      color: #000;
      border-color: var(--accent);
    }

    .editor-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
    }

    .config-group {
      margin-bottom: 1.5rem;
    }

    .config-group label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .config-group input, 
    .config-group select, 
    .config-group textarea {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
    }

    .config-group input:focus, 
    .config-group select:focus, 
    .config-group textarea:focus {
      outline: none;
      border-color: var(--accent, #0ff);
    }

    .config-group textarea {
      min-height: 80px;
      resize: vertical;
    }

    .config-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .array-item {
      background: rgba(255,255,255,0.03);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .badge-code {
      font-family: monospace;
      font-size: 0.7rem;
      background: rgba(0,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
    }

    /* Preview panel */
    .preview-panel {
      flex: 1;
      position: relative;
      background: var(--bg-deep, #050b14);
      overflow-y: auto;
    }

    .preview-header {
      position: absolute;
      top: 16px;
      right: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-family: monospace;
      color: var(--accent);
      border: 1px solid rgba(255,255,255,0.1);
      pointer-events: none;
    }

    #app-root {
      min-height: 100vh;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .sandbox-container {
        flex-direction: column;
        height: auto;
      }
      .editor-panel {
        width: 100%;
        max-height: 50vh;
      }
      .preview-panel {
        min-height: 50vh;
      }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent, #0ff);
      border-radius: 4px;
    }

    .reset-default {
      color: #ff6b6b;
      border-color: #ff6b6b !important;
    }
    .reset-default:hover {
      background: #ff6b6b !important;
      color: #fff !important;
    }
  </style>
</head>
<body>

<div class="sandbox-container">
  <!-- Left: Config Editor -->
  <div class="editor-panel">
    <div class="editor-header">
      <h3><i class="fas fa-code"></i> live configuration</h3>
      <div class="editor-actions">
        <button id="applyBtn"><i class="fas fa-play"></i> Apply</button>
        <button id="resetBtn" class="reset-default"><i class="fas fa-undo-alt"></i> Reset</button>
        <button id="exportBtn"><i class="fas fa-download"></i> Export</button>
      </div>
    </div>
    <div class="editor-content">
      <div class="config-group">
        <label><i class="fas fa-palette"></i> template</label>
        <select id="templateSelect">
          <option value="cyber">CYBER (neon)</option>
          <option value="figsh">FIGSH (glass)</option>
          <option value="aurora">AURORA (nature)</option>
          <option value="monochrome">MONOCHROME (minimal)</option>
        </select>
      </div>

      <div class="config-row">
        <div class="config-group">
          <label>logo name</label>
          <input type="text" id="logoName" value="DEVTEM">
        </div>
        <div class="config-group">
          <label>cta text</label>
          <input type="text" id="ctaText" value="CDN →">
        </div>
      </div>

      <div class="config-group">
        <label>nav links (comma separated, or label:href)</label>
        <textarea id="navLinks" placeholder="Docs:/docs, Sandbox:/sandbox, GitHub:https://github.com">Docs:/docs, Sandbox:/sandbox, Schema API:/api, npm Package:https://www.npmjs.com/package/devtemdesign</textarea>
        <small style="color:#666; font-size:0.65rem;">Format: "Label" or "Label:URL" — separate with commas</small>
      </div>

      <div class="config-group">
        <label>hero title line 1 & line 2</label>
        <div class="config-row">
          <input type="text" id="heroLine1" value="Declarative UI,">
          <input type="text" id="heroLine2" value="Zero-Config Motion">
        </div>
      </div>

      <div class="config-group">
        <label>hero subtitle</label>
        <textarea id="heroSubtitle">One configuration schema. Infinite animated synthesis. Stop building standard UI boilerplate—let the engine paint the viewport.</textarea>
      </div>

      <div class="config-row">
        <div class="config-group">
          <label>primary button text</label>
          <input type="text" id="primaryBtn" value="Read Docs">
        </div>
        <div class="config-group">
          <label>secondary button text</label>
          <input type="text" id="secondaryBtn" value="Copy CDN">
        </div>
      </div>

      <div class="config-group">
        <label>brands (comma separated)</label>
        <input type="text" id="brands" value="NPM, FSCSS, DEVTEMPLE, ESBUILD, CSS3, HTML5, WEBGL">
      </div>

      <div class="config-group">
        <label>footer copy</label>
        <input type="text" id="footerCopy" value="Figsh Labs • Open Source">
      </div>

      <div class="config-group">
        <label>features (JSON array — optional)</label>
        <textarea id="featuresJson" placeholder='[{"title":"Feature 1","desc":"Description","icon":"<i class=\"fas fa-cube\"></i>"}]'></textarea>
        <small style="color:#666;">Leave empty to hide features section</small>
      </div>
    </div>
  </div>

  <!-- Right: Live Preview -->
  <div class="preview-panel">
    <div class="preview-header">
      <i class="fas fa-eye"></i> live preview • engine running
    </div>
    <div id="app-root"></div>
  </div>
</div>

<script>
  // Default config
  const DEFAULT_CONFIG = {
    template: "cyber",
    logoName: "DEVTEM",
    navLinks: [
      { label: "Docs", href: "/docs" },
      { label: "Sandbox", href: "/sandbox" },
      { label: "Schema API", href: "/api" },
      { label: "npm Package", href: "https://www.npmjs.com/package/devtemdesign" }
    ],
    ctaText: "CDN →",
    heroTag: "Interactive Sandbox // devtemDesign@0.0.2",
    heroTitleLine1: "Declarative UI,",
    heroTitleLine2: "Zero-Config Motion",
    heroSubtitle: "One configuration schema. Infinite animated synthesis. Edit the config on the left — see the result instantly.",
    primaryBtnText: "Read Docs",
    secondaryBtnText: "Copy CDN",
    brandsSubtitle: "Live configuration playground",
    footerCopy: "Figsh Labs • Open Source",
    brands: ["NPM", "FSCSS", "DEVTEMPLE", "ESBUILD", "CSS3", "HTML5", "WEBGL"],
    featuresSectionLabel: "<i class='fas fa-code-branch'></i> TRY IT LIVE",
    featuresSectionTitle: "Edit config → Instant preview",
    features: [
      { title: "Real-time Updates", desc: "Change any value and click Apply — the engine re-renders instantly.", icon: "<i class='fas fa-bolt'></i>" },
      { title: "All Templates Available", desc: "Switch between cyber, figsh, aurora, and monochrome themes.", icon: "<i class='fas fa-palette'></i>" },
      { title: "Copy & Export", desc: "Export your config as JSON to use in your own projects.", icon: "<i class='fas fa-download'></i>" }
    ],
    panels: [
      { tag: "SANDBOX MODE", title: "Experiment Freely", desc: "All changes stay in your browser. No server, no saves — just pure exploration." },
      { tag: "CDN READY", title: "Use Anywhere", desc: "Copy the configuration export and paste it into any HTML page with devtemDesign included." }
    ]
  };

  // Parse navLinks from string (supports "Label" or "Label:URL")
  function parseNavLinks(str) {
    if (!str.trim()) return [];
    return str.split(',').map(item => {
      const trimmed = item.trim();
      if (trimmed.includes(':')) {
        const [label, href] = trimmed.split(':');
        return { label: label.trim(), href: href.trim() };
      }
      return { label: trimmed, href: '#' };
    });
  }

  // Parse brands from comma string
  function parseBrands(str) {
    if (!str.trim()) return [];
    return str.split(',').map(s => s.trim()).filter(s => s);
  }

  // Parse features JSON
  function parseFeatures(jsonStr) {
    if (!jsonStr.trim()) return [];
    try {
      const parsed = JSON.parse(jsonStr);
      return Array.isArray(parsed) ? parsed : [];
    } catch(e) {
      return [];
    }
  }

  // Build config from form inputs
  function getConfigFromForm() {
    const navLinksStr = document.getElementById('navLinks').value;
    const brandsStr = document.getElementById('brands').value;
    const featuresStr = document.getElementById('featuresJson').value;
    
    return {
      template: document.getElementById('templateSelect').value,
      logoName: document.getElementById('logoName').value || "DEVTEM",
      navLinks: parseNavLinks(navLinksStr),
      ctaText: document.getElementById('ctaText').value,
      heroTag: "⚡ Interactive Sandbox // devtemDesign@0.0.2",
      heroTitleLine1: document.getElementById('heroLine1').value,
      heroTitleLine2: document.getElementById('heroLine2').value,
      heroSubtitle: document.getElementById('heroSubtitle').value,
      primaryBtnText: document.getElementById('primaryBtn').value,
      secondaryBtnText: document.getElementById('secondaryBtn').value,
      brandsSubtitle: "Live configuration playground",
      footerCopy: document.getElementById('footerCopy').value,
      brands: parseBrands(brandsStr),
      featuresSectionLabel: "<i class='fas fa-code-branch'></i> TRY IT LIVE",
      featuresSectionTitle: "Edit config → Instant preview",
      features: parseFeatures(featuresStr).length ? parseFeatures(featuresStr) : DEFAULT_CONFIG.features,
      panels: DEFAULT_CONFIG.panels  // keep panels as default for sandbox demo
    };
  }

  // Render the page
  let currentRenderTimeout = null;
  function renderSandbox() {
    const config = getConfigFromForm();
    if (typeof devtemDesign === 'function') {
      devtemDesign("app-root", config);
      
      // Re-attach CDN copy handler for demo purposes
      setTimeout(() => {
        const secondaryBtn = document.querySelector('.btn-ghost');
        if (secondaryBtn) {
          secondaryBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const cdnSnippet = `<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/style.css">\n<script src="https://cdn.jsdelivr.net/npm/devtemdesign@0.0.2/script.js"><\/script>`;
            navigator.clipboard.writeText(cdnSnippet);
            const original = secondaryBtn.innerHTML;
            secondaryBtn.innerHTML = "✓ Copied!";
            setTimeout(() => { secondaryBtn.innerHTML = original; }, 1500);
          });
        }
        
        const primaryBtn = document.querySelector('.btn-primary');
        if (primaryBtn) {
          primaryBtn.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/docs';
          });
        }
      }, 100);
    } else {
      console.warn("devtemDesign engine not ready");
    }
  }

  // Apply button handler
  document.getElementById('applyBtn').addEventListener('click', () => {
    renderSandbox();
  });

  // Reset button
  document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('templateSelect').value = DEFAULT_CONFIG.template;
    document.getElementById('logoName').value = DEFAULT_CONFIG.logoName;
    document.getElementById('ctaText').value = DEFAULT_CONFIG.ctaText;
    document.getElementById('navLinks').value = "Docs:/docs, Sandbox:/sandbox, Schema API:/api, npm Package:https://www.npmjs.com/package/devtemdesign";
    document.getElementById('heroLine1').value = DEFAULT_CONFIG.heroTitleLine1;
    document.getElementById('heroLine2').value = DEFAULT_CONFIG.heroTitleLine2;
    document.getElementById('heroSubtitle').value = DEFAULT_CONFIG.heroSubtitle;
    document.getElementById('primaryBtn').value = DEFAULT_CONFIG.primaryBtnText;
    document.getElementById('secondaryBtn').value = DEFAULT_CONFIG.secondaryBtnText;
    document.getElementById('brands').value = DEFAULT_CONFIG.brands.join(', ');
    document.getElementById('footerCopy').value = DEFAULT_CONFIG.footerCopy;
    document.getElementById('featuresJson').value = JSON.stringify(DEFAULT_CONFIG.features, null, 2);
    renderSandbox();
  });

  // Export config as JSON
  document.getElementById('exportBtn').addEventListener('click', () => {
    const config = getConfigFromForm();
    const jsonStr = JSON.stringify(config, null, 2);
    navigator.clipboard.writeText(jsonStr);
    const exportBtn = document.getElementById('exportBtn');
    const originalText = exportBtn.innerHTML;
    exportBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
    setTimeout(() => { exportBtn.innerHTML = originalText; }, 1500);
  });

  // Initial render
  document.addEventListener('DOMContentLoaded', () => {
    // Set default features JSON in textarea
    document.getElementById('featuresJson').value = JSON.stringify(DEFAULT_CONFIG.features, null, 2);
    renderSandbox();
  });
</script>
</body>
</html>
